<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — B1 to B2 Erasmus English Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --ink:#1B2A41;
  --ink-soft:#3C4E68;
  --gold:#C9A227;
  --gold-soft:#E4C765;
  --teal:#2E6F6B;
  --teal-soft:#4E938F;
  --paper:#F7F4EC;
  --paper-2:#EFE9D8;
  --card:#FFFFFF;
  --line:#DCD3B8;
  --red:#B14A3B;
  --shadow: 0 10px 30px -12px rgba(27,42,65,0.25);
  --radius: 14px;
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}
[data-theme="dark"]{
  --ink:#F2ECD9;
  --ink-soft:#C7BFA6;
  --paper:#12181F;
  --paper-2:#1A222B;
  --card:#1D2530;
  --line:#2C3646;
  --gold:#E4C765;
  --teal:#5FB3AC;
  --shadow: 0 10px 30px -12px rgba(0,0,0,0.6);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  transition: background .3s ease, color .3s ease;
  min-height:100vh;
}
::selection{ background: var(--gold-soft); color:var(--ink);}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
.app{ display:flex; min-height:100vh; }

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:250px; flex-shrink:0;
  background: var(--ink);
  color: var(--paper);
  display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; overflow-y:auto;
  z-index:20;
}
[data-theme="dark"] .sidebar{ background:#0B0F14; }
.sidebar-brand{
  padding:26px 22px 18px;
  border-bottom:1px solid rgba(247,244,236,0.12);
}
.sidebar-brand .mark{
  font-family:var(--font-display); font-weight:700; font-size:1.5rem;
  letter-spacing:.5px;
}
.sidebar-brand .mark span{ color:var(--gold); }
.sidebar-brand .sub{ font-size:.72rem; opacity:.6; margin-top:4px; letter-spacing:.08em; text-transform:uppercase;}
.nav-group{ padding:14px 12px; }
.nav-label{ font-size:.68rem; text-transform:uppercase; letter-spacing:.12em; opacity:.45; padding:10px 10px 6px;}
.nav-item{
  display:flex; align-items:center; gap:10px;
  width:100%; background:none; border:none; color:var(--paper);
  padding:10px 12px; border-radius:10px; font-size:.88rem; text-align:left;
  opacity:.75; transition: all .15s ease;
}
.nav-item:hover{ background:rgba(247,244,236,0.08); opacity:1;}
.nav-item.active{ background:var(--gold); color:var(--ink); opacity:1; font-weight:600;}
.nav-icon{ width:18px; text-align:center; font-size:.95rem;}
.sidebar-foot{ margin-top:auto; padding:16px 20px; border-top:1px solid rgba(247,244,236,0.12); font-size:.72rem; opacity:.55;}

/* ---------- MAIN ---------- */
.main{ flex:1; min-width:0; }
.topbar{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; background:var(--paper); border-bottom:1px solid var(--line);
  backdrop-filter: blur(6px);
}
.topbar h1{ font-family:var(--font-display); font-size:1.3rem; font-weight:600;}
.topbar .az{ font-size:.78rem; color:var(--ink-soft); margin-top:2px;}
.topbar-actions{ display:flex; gap:10px; align-items:center;}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
  background:var(--card); display:flex; align-items:center; justify-content:center;
  font-size:1rem;
}
.content{ padding:28px 32px 80px; max-width:1180px; }

/* ---------- CARD PRIMITIVES ---------- */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:22px; box-shadow: var(--shadow);
}
.grid{ display:grid; gap:18px; }
.grid-2{ grid-template-columns:1fr 1fr; }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-4{ grid-template-columns:repeat(4,1fr); }
@media(max-width:900px){ .grid-2,.grid-3,.grid-4{ grid-template-columns:1fr; } .sidebar{position:fixed; left:-260px; transition:left .2s;} .sidebar.open{left:0;} .content{padding:20px 16px;} .topbar{padding:14px 16px;} }

h2.section-title{ font-family:var(--font-display); font-size:1.5rem; font-weight:600; margin-bottom:4px;}
.section-sub{ color:var(--ink-soft); font-size:.9rem; margin-bottom:18px; }
.tag{
  display:inline-flex; align-items:center; gap:5px; font-size:.68rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; padding:3px 9px; border-radius:20px;
  background:var(--paper-2); color:var(--teal); border:1px solid var(--line);
}
.tag.gold{ color:var(--gold); }
.tag.red{ color:var(--red); }

/* ---------- PASSPORT (signature element) ---------- */
.passport-wrap{ display:flex; gap:22px; align-items:stretch; flex-wrap:wrap;}
.passport{
  width:260px; min-height:190px; border-radius:10px; position:relative; flex-shrink:0;
  background: linear-gradient(155deg, var(--ink) 0%, #223554 100%);
  color:var(--paper); padding:20px; box-shadow: var(--shadow);
  border:1px solid rgba(255,255,255,0.08);
}
.passport::before{
  content:''; position:absolute; inset:8px; border:1px dashed rgba(228,199,101,0.35); border-radius:6px; pointer-events:none;
}
.passport .p-title{ font-family:var(--font-display); font-size:1rem; letter-spacing:.06em; text-transform:uppercase; color:var(--gold-soft);}
.passport .p-level{ font-size:2rem; font-family:var(--font-display); font-weight:700; margin-top:14px;}
.passport .p-target{ font-size:.78rem; opacity:.7; margin-top:2px;}
.stamps{ flex:1; min-width:260px; }
.stamps-grid{ display:grid; grid-template-columns:repeat(8,1fr); gap:8px; margin-top:10px;}
.stamp{
  aspect-ratio:1; border-radius:50%; border:2px dashed var(--line);
  display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700;
  color:var(--ink-soft);
}
.stamp.done{ border-style:solid; border-color:var(--teal); color:var(--teal); background:rgba(46,111,107,0.08); transform:rotate(-6deg);}
.stamp.current{ border-color:var(--gold); color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,39,0.15);}

/* progress bar */
.pbar-track{ height:10px; border-radius:6px; background:var(--paper-2); overflow:hidden; border:1px solid var(--line);}
.pbar-fill{ height:100%; background:linear-gradient(90deg, var(--teal), var(--gold)); border-radius:6px; transition:width .5s ease;}

.stat{ text-align:left; }
.stat .num{ font-family:var(--font-display); font-size:1.8rem; font-weight:700;}
.stat .lbl{ font-size:.76rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-top:2px;}

/* buttons */
.btn{
  display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:9px; border:none;
  font-weight:600; font-size:.86rem; background:var(--ink); color:var(--paper); transition:transform .12s;
}
.btn:hover{ transform:translateY(-1px);}
.btn.gold{ background:var(--gold); color:var(--ink);}
.btn.teal{ background:var(--teal); color:#fff;}
.btn.ghost{ background:transparent; color:var(--ink); border:1px solid var(--line);}
.btn.sm{ padding:6px 12px; font-size:.78rem;}
.btn:disabled{ opacity:.5; cursor:not-allowed;}

/* week roadmap */
.week-strip{ display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; margin-bottom:20px;}
.week-chip{
  flex-shrink:0; padding:10px 16px; border-radius:10px; border:1px solid var(--line); background:var(--card);
  font-size:.82rem; font-weight:600; white-space:nowrap;
}
.week-chip.active{ background:var(--ink); color:var(--paper); border-color:var(--ink);}
.week-chip .wk-theme{ display:block; font-weight:400; opacity:.65; font-size:.72rem; margin-top:2px;}

.goal-list{ list-style:none; }
.goal-list li{ padding:7px 0 7px 20px; position:relative; font-size:.88rem; border-bottom:1px dashed var(--line);}
.goal-list li:last-child{border-bottom:none;}
.goal-list li::before{ content:'—'; position:absolute; left:0; color:var(--teal); }

/* day tabs */
.day-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;}
.day-tab{ padding:8px 14px; border-radius:8px; border:1px solid var(--line); background:var(--card); font-size:.82rem; font-weight:600;}
.day-tab.active{ background:var(--teal); color:#fff; border-color:var(--teal);}
.day-tab.locked{ opacity:.45;}
.day-tab .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gold); margin-left:5px;}

.az-box{
  background:var(--paper-2); border-left:3px solid var(--teal); padding:10px 14px; border-radius:6px;
  font-size:.86rem; margin:10px 0; color:var(--ink-soft);
}
.az-box b{ color:var(--teal); }

.section-block{ margin-bottom:26px; }
.section-block h3{ font-family:var(--font-display); font-size:1.1rem; margin-bottom:8px; display:flex; align-items:center; gap:8px;}
.vocab-card{ border:1px solid var(--line); border-radius:10px; padding:14px; background:var(--paper-2); margin-bottom:10px;}
.vocab-word{ font-family:var(--font-display); font-weight:700; font-size:1.05rem;}
.vocab-word .pron{ font-family:var(--font-mono); font-weight:400; font-size:.8rem; color:var(--teal); margin-left:8px;}
.vocab-meta{ font-size:.78rem; color:var(--ink-soft); margin:4px 0;}
.chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.chip{ font-size:.74rem; padding:3px 9px; border-radius:20px; background:var(--card); border:1px solid var(--line);}

.qbox{ border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; background:var(--card);}
.qbox textarea, .qbox input[type=text]{
  width:100%; margin-top:8px; padding:9px 10px; border-radius:7px; border:1px solid var(--line);
  background:var(--paper); color:var(--ink); font-family:inherit; font-size:.88rem;
}
.reveal-btn{ font-size:.76rem; color:var(--teal); text-decoration:underline; background:none; border:none; margin-top:6px;}
.model-answer{ display:none; margin-top:8px; padding:10px; background:var(--paper-2); border-radius:7px; font-size:.85rem;}
.model-answer.shown{ display:block;}

.checkbox-row{ display:flex; align-items:center; gap:8px; margin-top:10px;}
.checkbox-row input{ width:18px; height:18px; accent-color: var(--teal);}

/* AI coach chat */
.chat-window{ height:420px; overflow-y:auto; border:1px solid var(--line); border-radius:10px; padding:16px; background:var(--paper-2); display:flex; flex-direction:column; gap:12px;}
.msg{ max-width:80%; padding:10px 14px; border-radius:12px; font-size:.88rem; line-height:1.45;}
.msg.user{ align-self:flex-end; background:var(--teal); color:#fff; border-bottom-right-radius:3px;}
.msg.ai{ align-self:flex-start; background:var(--card); border:1px solid var(--line); border-bottom-left-radius:3px;}
.chat-input-row{ display:flex; gap:8px; margin-top:12px;}
.chat-input-row input{ flex:1; padding:11px 14px; border-radius:9px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:inherit;}

/* sentence builder */
.sb-slots{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; min-height:46px; align-items:center; padding:12px; background:var(--paper-2); border-radius:10px; border:1px dashed var(--line);}
.sb-slot{ padding:8px 14px; border-radius:8px; font-size:.86rem; font-weight:600; color:#fff; }
.sb-pool{ margin-bottom:14px;}
.sb-pool-label{ font-size:.74rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:6px;}
.sb-chip{ padding:7px 13px; border-radius:20px; border:1px solid var(--line); background:var(--card); font-size:.84rem; margin:3px;}
.sb-chip:hover{ background:var(--gold-soft);}

.loader{ display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--teal); border-radius:50%; animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.empty{ text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty .big{ font-size:2rem; margin-bottom:8px;}

table.simple{ width:100%; border-collapse:collapse; font-size:.85rem;}
table.simple th, table.simple td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--line);}
table.simple th{ color:var(--ink-soft); font-weight:600; font-size:.74rem; text-transform:uppercase; letter-spacing:.05em;}

.hamburger{ display:none; }
@media(max-width:900px){ .hamburger{ display:flex; } }

.movie-card, .yt-card{ display:flex; gap:14px; align-items:flex-start; border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; background:var(--paper-2);}
.movie-card .poster, .yt-card .poster{ width:54px; height:54px; border-radius:10px; background:var(--ink); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0;}

.score-ring{ width:80px; height:80px; }
</style>
</head>

async function ensureAuth(){
  if(supabaseAccessToken) return;
  if(authPromise) return authPromise;
  authPromise = (async ()=>{
    const res = await fetch(SUPABASE_URL + "/auth/v1/signup", {
      method:"POST",
      headers:{ "apikey": SUPABASE_ANON_KEY, "Content-Type":"application/json" },
      body: JSON.stringify({})

   ============================================================ */
async function callClaude(messages, systemPrompt, maxTokens){
  const body = {
    model:"claude-sonnet-4-6",
    max_tokens: maxTokens || 1000,
    messages: messages
  };
  if(systemPrompt) body.system = systemPrompt;
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  const data = await response.json();
  const textBlocks = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text);
  return textBlocks.join("\n");
}

function extractJSON(text){
  let t = text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  return JSON.parse(t);
}

async function generateDailyLesson(week, day, weekMeta){
  const sys = "You are an expert B1-to-B2 English curriculum designer creating content for an Azerbaijani Erasmus/ESC applicant in Baku. Respond ONLY with valid JSON, no preamble, no markdown fences. The JSON schema must exactly match: {\"title\":string,\"az\":string,\"vocab\":[{\"word\":string,\"pron\":string,\"pos\":string,\"meaning\":string,\"example\":string,\"collocations\":[string],\"synonyms\":[string],\"antonyms\":[string]}] (5 items),\"quiz\":[{\"q\":string,\"options\":[string,string,string],\"answer\":number}] (3 items),\"speaking\":{\"warmup\":string,\"task\":string,\"az\":string,\"usefulPhrases\":[string],\"connectors\":[string],\"modelAnswer\":string},\"listening\":{\"title\":string,\"script\":string,\"questions\":[{\"q\":string,\"type\":string,\"answer\":string}],\"gapfill\":string,\"vocabFocus\":[string]},\"reading\":{\"title\":string,\"topic\":string,\"text\":string,\"questions\":[string],\"vocab\":[string]},\"writing\":{\"task\":string,\"az\":string,\"checklist\":[string]},\"grammar\":{\"title\":string,\"explanation\":string,\"examples\":[string],\"exercises\":[{\"q\":string,\"answer\":string}]}}. All Azerbaijani fields (az) must be real natural Azerbaijani. Keep vocabulary strictly B1-B2 level and thematically tied to the week's theme.";
  const usr = `Create Day ${day} of Week ${week} (theme: "${weekMeta.theme}"). Weekly goals: ${weekMeta.goals.join('; ')}. Speaking priority is highest, so make the speaking task rich and specific to real Erasmus/volunteering/everyday-life situations. Vary listening accents/speeds across days.`;
  const raw = await callClaude([{role:"user", content:usr}], sys, 3000);
  return extractJSON(raw);
}

async function generateWeeklyTest(week, weekMeta){
  const sys = "You are an English test designer. Respond ONLY with valid JSON matching: {\"vocab\":[{\"q\":string,\"options\":[string,string,string,string],\"answer\":number}] (5 items),\"grammar\":[{\"q\":string,\"options\":[string,string,string,string],\"answer\":number}] (5 items),\"reading\":{\"text\":string,\"questions\":[{\"q\":string,\"options\":[string,string,string,string],\"answer\":number}] (3 items)},\"writing\":{\"prompt\":string},\"speaking\":{\"prompt\":string}}. No markdown, no preamble.";
  const usr = `Create a Week ${week} test for the theme "${weekMeta.theme}", B1-B2 level, related to: ${weekMeta.goals.join('; ')}.`;
  const raw = await callClaude([{role:"user", content:usr}], sys, 2200);
  return extractJSON(raw);
}

    STATE.progress.xp += 20;
    const today = todayStr();
    if(STATE.progress.lastActiveDate !== today){
      const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
      STATE.progress.streak = (STATE.progress.lastActiveDate === yesterday) ? STATE.progress.streak+1 : 1;
      STATE.progress.lastActiveDate = today;
    }
    STATE.progress.dailyLog.push({date:today, week, day});
    await saveProgress(STATE.progress);
  }
  render();
}

async function markTaskDone(field){
  STATE.progress[field] = (STATE.progress[field]||0) + 1;
  await saveProgress(STATE.progress);
  render();
}

const SB_POOLS = {
  subject:["I","She","We","My colleagues","The volunteers","Erasmus students"],
  verb:["are discussing","have finished","will present","enjoyed","are preparing","talked about"],
  object:["the project plan","a new idea","the workshop","our experience","the schedule","local culture"],
  time:["this morning","last week","before the deadline","every day","during the event","right now"],
  place:["at the office","in the city center","during the workshop","at the host organisation","online","in the meeting room"]
};
const SB_COLORS = {subject:"#2E6F6B", verb:"#C9A227", object:"#B14A3B", time:"#3C4E68", place:"#4E938F"};

function renderSentenceBuilder(){
  const s = STATE.sbSlots;
  const order = ["subject","verb","object","place","time"];
  const sentence = order.map(k=>s[k]).filter(Boolean).join(' ');
  return `
  <div class="card" style="margin-bottom:20px;">
    <h2 class="section-title">Build a Natural English Sentence</h2>

    <div class="sb-slots">
      ${order.map(k=> s[k] ? `<span class="sb-slot" style="background:${SB_COLORS[k]}">${s[k]}</span>` : `<span class="sb-slot" style="background:var(--line); color:var(--ink-soft);">${k}</span>`).join('')}
    </div>
    ${sentence ? `<div class="az-box"><b>Your sentence:</b> ${sentence}.</div>` : ''}
    ${order.map(k=>`
      <div class="sb-pool">
        <div class="sb-pool-label">${k}</div>
        ${SB_POOLS[k].map(opt=>`<button class="sb-chip" data-sb-key="${k}" data-sb-val="${opt}">${opt}</button>`).join('')}
      </div>`).join('')}
    <button class="btn ghost sm" id="sbReset">Reset</button>
  </div>
  <div class="card">
    <h2 class="section-title">Useful Sentence Patterns</h2>
    <ul class="goal-list">
      <li>Subject + Verb + Object + Place + Time — "We discussed the project at the office this morning."</li>
      <li>Opinion pattern: "In my opinion, + [clause], because + [reason]."</li>
      <li>Comparison pattern: "Unlike + [X], + [Y] + [difference]."</li>
      <li>Result pattern: "[Cause], so + [result]." / "Because of + [cause], + [result]."</li>
      <li>Contrast pattern: "Although + [clause A], + [clause B]."</li>
    </ul>
  </div>`;
}

  const wk = WEEKS[STATE.selWeek-1];
  const test = STATE.testCache[STATE.selWeek];
  const weekStrip = `<div class="week-strip">${WEEKS.map(w=>`<button class="week-chip ${w.n===STATE.selWeek?'active':''}" data-sel-week-test="${w.n}">Week ${w.n}</button>`).join('')}</div>`;
  if(!test){
    return weekStrip + `<div class="card empty"><div class="big">✓</div>
    <p style="margin-bottom:14px;">No test generated yet for Week ${STATE.selWeek} (<b>${wk.theme}</b>). Generate a full vocabulary, grammar, reading, writing and speaking test.</p>
    <button class="btn gold" id="genTestBtn" ${STATE.testLoading?'disabled':''}>${STATE.testLoading?'<span class="loader"></span> Generating…':'✨ Generate Week '+STATE.selWeek+' Test'}</button>
    </div>`;
  }
  return weekStrip + `
  <div class="card" style="margin-bottom:16px;"><h2 class="section-title">Vocabulary Test</h2>
  ${test.vocab.map((q,i)=>`<div class="qbox"><b>${i+1}. ${q.q}</b><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">${q.options.map((o,oi)=>`<button class="btn ghost sm test-opt" data-tkey="vocab" data-ti="${i}" data-oi="${oi}" data-correct="${q.answer}">${o}</button>`).join('')}</div><div class="quiz-feedback" id="tf-vocab-${i}"></div></div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:16px;"><h2 class="section-title">Grammar Test</h2>
  ${test.grammar.map((q,i)=>`<div class="qbox"><b>${i+1}. ${q.q}</b><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">${q.options.map((o,oi)=>`<button class="btn ghost sm test-opt" data-tkey="grammar" data-ti="${i}" data-oi="${oi}" data-correct="${q.answer}">${o}</button>`).join('')}</div><div class="quiz-feedback" id="tf-grammar-${i}"></div></div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:16px;"><h2 class="section-title">Reading Test</h2>
  <p style="font-size:.88rem; margin-bottom:10px;">${test.reading.text}</p>
  ${test.reading.questions.map((q,i)=>`<div class="qbox"><b>${i+1}. ${q.q}</b><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">${q.options.map((o,oi)=>`<button class="btn ghost sm test-opt" data-tkey="reading" data-ti="${i}" data-oi="${oi}" data-correct="${q.answer}">${o}</button>`).join('')}</div><div class="quiz-feedback" id="tf-reading-${i}"></div></div>`).join('')}
  </div>
  <div class="grid grid-2">
    <div class="card"><h3>✍ Writing Test</h3><p style="font-size:.88rem; margin:8px 0;">${test.writing.prompt}</p><textarea rows="5" placeholder="Write your response..."></textarea></div>
    <div class="card"><h3>🗣 Speaking Test</h3><p style="font-size:.88rem; margin:8px 0;">${test.speaking.prompt}</p><textarea rows="5" placeholder="Type notes on what you said aloud..."></textarea></div>
  </div>
  <div style="margin-top:14px;"><span id="testScore" class="tag gold">Score: 0/${test.vocab.length+test.grammar.length+test.reading.questions.length}</span></div>
  `;
}

/* ============================================================
   RENDER: AI COACH
   ============================================================ */
function renderCoach(){
  return `
  <div class="card">
    <h2 class="section-title">Your Personal AI English Coach</h2>
    <div class="section-sub">Qrammatikanı düzəldir, lüğəti inkişaf etdirir, danışıq sualları verir, motivasiya edir.</div>
    <div class="chat-window" id="chatWindow">
      ${STATE.chat.length===0 ? `<div class="msg ai">Salam Ilkin! I'm your AI English coach. Tell me about your day in English, ask me to correct a sentence, or ask for today's speaking question. Let's go! 🚀</div>` : ''}
      ${STATE.chat.map(m=>`<div class="msg ${m.role==='user'?'user':'ai'}">${m.content}</div>`).join('')}
      ${STATE.chatLoading ? `<div class="msg ai"><span class="loader"></span> thinking...</div>`:''}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Write in English (or ask in Azerbaijani)..." />
      <button class="btn gold" id="chatSendBtn">Send</button>
    </div>
    <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
      <button class="btn ghost sm" data-quick="Give me a random speaking question about Erasmus for practice.">🎲 Speaking question</button>
      <button class="btn ghost sm" data-quick="Correct this sentence and explain the mistake: I am agree with you about this topic.">✏️ Correct a sentence</button>
      <button class="btn ghost sm" data-quick="Motivate me to keep studying English today in 2 sentences.">💪 Motivate me</button>
    </div>
  </div>`;
}

/* ============================================================
   RENDER: ANALYTICS
   ============================================================ */
let chartInstances = [];
function renderAnalytics(){
  return `
  <div class="grid grid-2" style="margin-bottom:18px;">
    <div class="card"><h3 style="margin-bottom:10px;">Daily Activity (last 14 days)</h3><canvas id="chartDaily" height="180"></canvas></div>
    <div class="card"><h3 style="margin-bottom:10px;">Tasks by Skill</h3><canvas id="chartSkills" height="180"></canvas></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:10px;">Predicted Level Progress</h3>
    <canvas id="chartLevel" height="120"></canvas>
  </div>`;
}
function drawCharts(){
  chartInstances.forEach(c=>c.destroy());
  chartInstances = [];
  const p = STATE.progress;
  const days = [];
  const counts = [];
  for(let i=13;i>=0;i--){
    const d = new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    days.push(d.slice(5));
    counts.push(p.dailyLog.filter(l=>l.date===d).length);
  }
  const c1 = document.getElementById('chartDaily');
  if(c1) chartInstances.push(new Chart(c1, {type:'line', data:{labels:days, datasets:[{label:'Days completed', data:counts, borderColor:'#2E6F6B', backgroundColor:'rgba(46,111,107,0.15)', fill:true, tension:.3}]}, options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{stepSize:1}}}}}));

  const c2 = document.getElementById('chartSkills');
  if(c2) chartInstances.push(new Chart(c2, {type:'bar', data:{labels:['Vocab','Speaking','Listening','Reading','Writing','Grammar'], datasets:[{label:'Tasks completed', data:[p.vocabLearned,p.speakingDone,p.listeningDone,p.readingDone,p.writingDone,p.grammarDone], backgroundColor:['#C9A227','#B14A3B','#2E6F6B','#3C4E68','#4E938F','#1B2A41']}]}, options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}}));

  const overall = computeOverallProgress(p);
  const predicted = overall < 34 ? 'B1' : overall < 67 ? 'B1+' : 'B2';
  const c3 = document.getElementById('chartLevel');
  if(c3) chartInstances.push(new Chart(c3, {type:'bar', data:{labels:['B1','B1+','B2'], datasets:[{label:'Journey', data:[33,33,34], backgroundColor:['#4E938F','#C9A227','#B14A3B']}]}, options:{indexAxis:'y', plugins:{legend:{display:false}, title:{display:true, text:'Estimated current level: '+predicted}}, scales:{x:{stacked:true, display:false}, y:{stacked:true}}}}));
}

/* ============================================================
   MASTER RENDER
   ============================================================ */
function render(){
  let inner = '';
  if(STATE.route==='dashboard') inner = renderDashboard();
  else if(STATE.route==='roadmap') inner = renderRoadmap();
  else if(STATE.route==='lesson') inner = renderLesson();
  else if(STATE.route==='sentence') inner = renderSentenceBuilder();
  else if(STATE.route==='erasmus') inner = renderErasmus();
  else if(STATE.route==='movies') inner = renderMovies();
  else if(STATE.route==='youtube') inner = renderYoutube();
  else if(STATE.route==='tests') inner = renderTests();
  else if(STATE.route==='coach') inner = renderCoach();
  else if(STATE.route==='analytics') inner = renderAnalytics();

  root.innerHTML = layout(inner);
  document.documentElement.setAttribute('data-theme', STATE.theme);
  attachEvents();
  if(STATE.route==='analytics') setTimeout(drawCharts, 30);
  if(STATE.route==='coach'){
    const cw = document.getElementById('chatWindow');
    if(cw) cw.scrollTop = cw.scrollHeight;
  }
}

/* ============================================================
   EVENTS
   ============================================================ */
function attachEvents(){
  root.querySelectorAll('[data-route]').forEach(el=>{
    el.addEventListener('click', ()=>{
      STATE.route = el.getAttribute('data-route'); STATE.sidebarOpen=false; render();
      if(STATE.route==='lesson') ensureLessonLoaded();
      if(STATE.route==='tests') ensureTestLoaded(STATE.selWeek);
    });
  });
  const hb = document.getElementById('hamburgerBtn');
  if(hb) hb.addEventListener('click', ()=>{ STATE.sidebarOpen = !STATE.sidebarOpen; render(); });
  const tt = document.getElementById('themeToggle');
  if(tt) tt.addEventListener('click', async ()=>{ STATE.theme = STATE.theme==='dark'?'light':'dark'; await saveTheme(STATE.theme); render(); });

  root.querySelectorAll('[data-week-jump]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.selWeek = parseInt(el.getAttribute('data-week-jump')); STATE.selDay=1; STATE.route='lesson'; render(); ensureLessonLoaded(); });
  });
  root.querySelectorAll('[data-sel-week]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.selWeek = parseInt(el.getAttribute('data-sel-week')); STATE.selDay=1; render(); ensureLessonLoaded(); });
  });
  root.querySelectorAll('[data-sel-day]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.selDay = parseInt(el.getAttribute('data-sel-day')); render(); ensureLessonLoaded(); });
  });
  root.querySelectorAll('[data-sel-week-test]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.selWeek = parseInt(el.getAttribute('data-sel-week-test')); render(); ensureTestLoaded(STATE.selWeek); });
  });

  root.querySelectorAll('[data-reveal]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const t = document.getElementById(el.getAttribute('data-reveal'));
      if(t) t.classList.toggle('shown');
      if(t) t.style.display = t.style.display==='block' ? 'none' : 'block';
    });
  });

  root.querySelectorAll('.quiz-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      const correct = parseInt(el.getAttribute('data-correct'));
      const opt = parseInt(el.getAttribute('data-opt'));
      const qi = el.getAttribute('data-quiz');
      const fb = document.getElementById('qf-'+qi);
      if(fb) fb.innerHTML = opt===correct ? '<span style="color:var(--teal);">✓ Correct!</span>' : '<span style="color:var(--red);">✗ Try again.</span>';
    });
  });

  root.querySelectorAll('.test-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      const correct = parseInt(el.getAttribute('data-correct'));
      const oi = parseInt(el.getAttribute('data-oi'));
      const key = el.getAttribute('data-tkey');
      const ti = el.getAttribute('data-ti');
      const fb = document.getElementById('tf-'+key+'-'+ti);
      if(fb) fb.innerHTML = oi===correct ? '<span style="color:var(--teal);">✓ Correct</span>' : '<span style="color:var(--red);">✗ Incorrect</span>';
    });
  });

  const completeBtn = document.getElementById('completeDayBtn');
  if(completeBtn) completeBtn.addEventListener('click', ()=> markDayComplete(STATE.selWeek, STATE.selDay));

  root.querySelectorAll('[data-task-done]').forEach(el=>{
    el.addEventListener('click', ()=> markTaskDone(el.getAttribute('data-task-done')));
  });

  const genBtn = document.getElementById('genLessonBtn');
  if(genBtn) genBtn.addEventListener('click', async ()=>{
    STATE.lessonLoading = true; render();
    try{
      const wk = WEEKS[STATE.selWeek-1];
      const data = await generateDailyLesson(STATE.selWeek, STATE.selDay, wk);
      STATE.lessonCache[lessonKey()] = data;
      await setCachedLesson(lessonKey(), data);
    }catch(e){ console.error(e); alert('Could not generate the lesson. Please try again.'); }
    STATE.lessonLoading = false; render();
  });

  const genTestBtn = document.getElementById('genTestBtn');
  if(genTestBtn) genTestBtn.addEventListener('click', async ()=>{
    STATE.testLoading = true; render();
    try{
      const wk = WEEKS[STATE.selWeek-1];
      const data = await generateWeeklyTest(STATE.selWeek, wk);
      STATE.testCache[STATE.selWeek] = data;
      await setStateRow('test:'+STATE.selWeek, data);
    }catch(e){ console.error(e); alert('Could not generate the test. Please try again.'); }
    STATE.testLoading = false; render();
  });

  // sentence builder
  root.querySelectorAll('.sb-chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      STATE.sbSlots[el.getAttribute('data-sb-key')] = el.getAttribute('data-sb-val');
      render();
    });
  });
  const sbReset = document.getElementById('sbReset');
  if(sbReset) sbReset.addEventListener('click', ()=>{ STATE.sbSlots = {subject:null,verb:null,object:null,time:null,place:null}; render(); });

  // coach chat
  const chatSend = document.getElementById('chatSendBtn');
  const chatInput = document.getElementById('chatInput');
  async function sendChat(text){
    if(!text || !text.trim()) return;
    STATE.chat.push({role:'user', content:text});
    STATE.chatLoading = true; render();
    try{
      const apiMessages = STATE.chat.map(m=>({role:m.role==='user'?'user':'assistant', content:m.content}));
      const sys = "You are a warm, encouraging B1-to-B2 English coach for an Azerbaijani Erasmus/ESC applicant. Correct mistakes gently with brief explanations, teach natural phrasing, ask a follow-up speaking question when appropriate, and keep replies concise (under 100 words) and motivating. You may use short Azerbaijani asides in parentheses when clarifying a tricky point.";
      const reply = await callClaude(apiMessages, sys, 500);
      STATE.chat.push({role:'assistant', content:reply});
      await saveChatHistory(STATE.chat);
    }catch(e){ console.error(e); STATE.chat.push({role:'assistant', content:"Sorry, I couldn't respond right now — please try again."}); }
    STATE.chatLoading = false; render();
  }
  if(chatSend) chatSend.addEventListener('click', ()=>{ const v = chatInput.value; chatInput.value=''; sendChat(v); });
  if(chatInput) chatInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ const v = chatInput.value; chatInput.value=''; sendChat(v); }});
  root.querySelectorAll('[data-quick]').forEach(el=>{
    el.addEventListener('click', ()=> sendChat(el.getAttribute('data-quick')));
  });
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  try{
    await ensureAuth();
  }catch(e){
    root.innerHTML = `<div style="padding:40px; font-family:sans-serif; max-width:520px; margin:60px auto; text-align:center;">
      <h2>Connection issue</h2>
      <p>Couldn't connect to the Compass database. This usually means <b>Anonymous Sign-In</b> isn't enabled yet in the Supabase project (Authentication → Settings → Enable anonymous sign-ins), or the network blocked the request.</p>
    </div>`;
    return;
  }
  STATE.progress = await loadProgress();
  STATE.theme = await loadTheme();
  STATE.chat = await getChatHistory();
  render();
  ensureLessonLoaded();
}
init();
</script>
</body>
